name: Build Android APK (Gradle + R2)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      organization_id:
        description: "Organization ID (Optional - creates specific folder)"
        required: false # Changed to false so main branch pushes don't fail
        type: string
      api_env:
        description: "API environment override (optional)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - production
          - development

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.15.1"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    name: Build APK and Upload to R2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Determine API Base URL
      # ----------------------------
      - name: Determine API Base URL
        id: api
        shell: bash
        run: |
          INPUT_API="${{ inputs.api_env }}" # simplified syntax
          BRANCH="${GITHUB_REF##*/}"

          if [ "$INPUT_API" = "production" ]; then
            echo "API_URL=https://api.appointer.hu" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$INPUT_API" = "development" ]; then
            echo "API_URL=https://apidev.appointer.hu" >> $GITHUB_OUTPUT
            exit 0
          fi

          # AUTO MODE — follows branch
          if [ "$BRANCH" = "main" ]; then
            echo "API_URL=https://api.appointer.hu" >> $GITHUB_OUTPUT
            echo "Using PRODUCTION API"
          else
            echo "API_URL=https://apidev.appointer.hu" >> $GITHUB_OUTPUT
            echo "Using DEVELOPMENT API"
          fi

      # ----------------------------
      # Node + pnpm setup
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate placeholder assets
        working-directory: apps/mobile
        run: |
          pnpm run generate-assets || node scripts/generate-assets.js

      # ----------------------------
      # Expo prebuild
      # ----------------------------
      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run Expo Prebuild
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Running Expo prebuild..."
          npx expo prebuild --platform android --non-interactive

      # ----------------------------
      # Android build
      # ----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK with Gradle
        id: build_apk
        working-directory: apps/mobile/android
        # IMPORTANT: Ensure your android/app/build.gradle has a signingConfig for 'release'
        # or this step will fail (or produce an unsigned APK that won't install).
        run: |
          chmod +x ./gradlew

          echo "Cleaning build..."
          ./gradlew clean

          echo "Generating autolinking PackageList..."
          ./gradlew :app:generateAutolinkingPackageList || true

          echo "Running fixAutolinking..."
          ./gradlew :app:fixAutolinking || true

          echo "Building release APK..."
          ./gradlew assembleRelease

          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi

          # Move to root for easier access in next step
          cp "$APK_PATH" ../../../app-release.apk
          echo "APK_PATH=$(pwd)/../../../app-release.apk" >> $GITHUB_OUTPUT

      # ----------------------------
      # Upload Directly to Cloudflare R2
      # ----------------------------
      - name: Upload APK to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          ORG_ID: ${{ inputs.organization_id }}
        run: |
          APK_PATH="${{ steps.build_apk.outputs.APK_PATH }}"

          # 1. Define R2 Endpoint
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # 2. Determine Destination Path in Bucket
          if [ -n "$ORG_ID" ]; then
             # Case: Manual build for specific Organization
             DEST_KEY="organizations/${ORG_ID}/app-release.apk"
             echo "📂 Target: Organization Folder ($ORG_ID)"
          else
             # Case: Push to branch (Generic release)
             BRANCH_NAME="${GITHUB_REF##*/}"
             DEST_KEY="releases/${BRANCH_NAME}/app-release.apk"
             echo "📂 Target: Generic Branch Folder ($BRANCH_NAME)"
          fi

          echo "🚀 Uploading to s3://${BUCKET_NAME}/${DEST_KEY}"

          # 3. Upload command optimized for R2 (No ACLs, explicit Content-Type)
          aws s3 cp "$APK_PATH" "s3://${BUCKET_NAME}/${DEST_KEY}" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/vnd.android.package-archive"

          echo "✅ Upload Complete"

          # Optional: Print download link info
          # If you have a custom domain mapped in Cloudflare R2 settings:
          echo "Expected Download URL (if Custom Domain configured):"
          echo "https://downloads.your-app.com/${DEST_KEY}"

      # ----------------------------
      # Cleanup
      # ----------------------------
      - name: Cleanup
        if: always()
        run: |
          rm -f app-release.apk
          echo "Cleanup done"
