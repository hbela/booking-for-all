name: EAS Build Android APK

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      organization_id:
        description: "Organization ID to upload APK to"
        required: true
        type: string
      api_env:
        description: "API environment override (optional)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - production
          - development
      build_profile:
        description: "EAS Build Profile"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.15.1"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    name: Build APK and Upload to S3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Determine API Base URL
      # ----------------------------
      - name: Determine API Base URL
        id: api
        shell: bash
        run: |
          INPUT_API="${{ github.event.inputs.api_env }}"
          BRANCH="${GITHUB_REF##*/}"

          if [ "$INPUT_API" = "production" ]; then
            echo "API_URL=https://api.appointer.hu" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$INPUT_API" = "development" ]; then
            echo "API_URL=https://apidev.appointer.hu" >> $GITHUB_OUTPUT
            exit 0
          fi

          # AUTO MODE — follows branch
          if [ "$BRANCH" = "main" ]; then
            echo "API_URL=https://api.appointer.hu" >> $GITHUB_OUTPUT
            echo "Using PRODUCTION API"
          else
            echo "API_URL=https://apidev.appointer.hu" >> $GITHUB_OUTPUT
            echo "Using DEVELOPMENT API"
          fi

      # ----------------------------
      # Node + pnpm setup
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate placeholder assets
        working-directory: apps/mobile
        run: |
          pnpm run generate-assets || node scripts/generate-assets.js

      # ----------------------------
      # Expo prebuild
      # ----------------------------
      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run Expo Prebuild
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Running Expo prebuild..."
          npx expo prebuild --platform android --non-interactive

      # ----------------------------
      # Android build
      # ----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK with Gradle
        id: build_apk
        working-directory: apps/mobile/android
        run: |
          chmod +x ./gradlew

          echo "Cleaning build..."
          ./gradlew clean

          echo "Generating autolinking PackageList..."
          ./gradlew :app:generateAutolinkingPackageList || true

          echo "Running fixAutolinking..."
          ./gradlew :app:fixAutolinking || true

          echo "Building release APK..."
          ./gradlew assembleRelease

          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi

          cp "$APK_PATH" ../app-release.apk

          echo "APK_PATH=$(pwd)/../app-release.apk" >> $GITHUB_OUTPUT

      # ----------------------------
      # Login to API
      # ----------------------------
      - name: Authenticate with API
        id: auth
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          API_BASE="${{ steps.api.outputs.API_URL }}"

          echo "Authenticating with API: $API_BASE"

          RESPONSE=$(curl -s -c /tmp/cookies.txt -X POST \
            "$API_BASE/api/auth/sign-in/email" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}")

          if echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
