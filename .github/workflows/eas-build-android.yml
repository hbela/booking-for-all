name: EAS Build Android APK

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      organization_id:
        description: "Organization ID to upload APK to"
        required: true
        type: string
      build_profile:
        description: "EAS Build Profile"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.15.1"

jobs:
  build-and-upload:
    name: Build APK and Upload to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate placeholder assets
        working-directory: apps/mobile
        run: |
          echo "🎨 Generating placeholder assets..."
          pnpm run generate-assets || node scripts/generate-assets.js

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          # Only need token for prebuild, not for building
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine Organization ID
        id: org-id
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "org_id=${{ github.event.inputs.organization_id }}" >> $GITHUB_OUTPUT
          else
            # For push events, you can set a default org ID or use an env var
            # You may want to modify this to fetch from your API or use a secret
            echo "org_id=${{ secrets.DEFAULT_ORG_ID }}" >> $GITHUB_OUTPUT
          fi
          echo "Using Organization ID: $(echo ${{ steps.org-id.outputs.org_id }})"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Expo Prebuild
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "🔧 Running Expo prebuild to generate native Android project..."
          npx expo prebuild --platform android --clean

      - name: Verify expo-modules-core installation
        working-directory: apps/mobile
        run: |
          echo "🔍 Verifying expo-modules-core is installed..."
          if pnpm list expo-modules-core > /dev/null 2>&1; then
            echo "✅ expo-modules-core is installed"
            pnpm list expo-modules-core
          else
            echo "⚠️  expo-modules-core not found in node_modules, but should be in package.json"
            echo "This is expected if it was just added - autolinking should handle it"
          fi

      - name: Build Android APK with Gradle
        working-directory: apps/mobile/android
        env:
          NODE_ENV: production
        run: |
          echo "🔨 Building Android APK with Gradle (no EAS queue!)..."

          # Make gradlew executable
          chmod +x ./gradlew

          # Clean build to ensure fresh autolinking
          echo "🧹 Cleaning previous build..."
          ./gradlew clean

          # Generate autolinking PackageList to check if expo-modules-core is linked
          echo "📦 Generating autolinking PackageList..."
          ./gradlew :app:generateAutolinkingPackageList || true

          # Fix: Remove ExpoModulesPackage reference (expo.core.ExpoModulesPackage doesn't exist in SDK 52)
          PACKAGE_LIST_FILE="app/build/generated/autolinking/src/main/java/com/facebook/react/PackageList.java"
          if [ -f "$PACKAGE_LIST_FILE" ]; then
            if grep -q "ExpoModulesPackage" "$PACKAGE_LIST_FILE"; then
              echo "⚠️  ExpoModulesPackage still referenced, applying fix..."
              
              # Create a backup
              cp "$PACKAGE_LIST_FILE" "${PACKAGE_LIST_FILE}.bak"
              
              # Remove import lines (both expo.core and expo.modules variants)
              sed -i '/import expo\.core\.ExpoModulesPackage;/d' "$PACKAGE_LIST_FILE"
              sed -i '/import expo\.modules\.ExpoModulesPackage;/d' "$PACKAGE_LIST_FILE"
              
              # Remove the instantiation line (handle various formats)
              sed -i '/new ExpoModulesPackage()/d' "$PACKAGE_LIST_FILE"
              sed -i '/\bExpoModulesPackage\b/d' "$PACKAGE_LIST_FILE"
              
              # Clean up trailing commas and formatting
              # Remove comma before closing parenthesis
              sed -i 's/,\s*)/)/g' "$PACKAGE_LIST_FILE"
              # Remove trailing comma at end of line
              sed -i 's/,\s*$//' "$PACKAGE_LIST_FILE"
              # Fix double commas
              sed -i 's/,\s*,/,/g' "$PACKAGE_LIST_FILE"
              # Remove comma before closing brace if on same line
              sed -i 's/,\s*}/}/g' "$PACKAGE_LIST_FILE"
              
              echo "✅ Fixed PackageList.java - removed ExpoModulesPackage references"
              echo "📝 Diff:"
              diff "${PACKAGE_LIST_FILE}.bak" "$PACKAGE_LIST_FILE" || true
            else
              echo "✅ PackageList.java looks correct (no ExpoModulesPackage reference)"
            fi
          else
            echo "⚠️  PackageList.java not found yet, will be generated during build"
          fi

          # Build release APK
          ./gradlew assembleRelease

          # Find the generated APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK file not found after build"
            echo "Build output directory contents:"
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi

          # Copy APK to a predictable location
          cp "$APK_PATH" ../app-release.apk

          # Verify APK is a valid ZIP file (APKs are ZIP archives)
          if ! unzip -t ../app-release.apk > /dev/null 2>&1; then
            echo "❌ Generated file is not a valid APK (ZIP archive)"
            exit 1
          fi

          APK_SIZE=$(du -h ../app-release.apk | cut -f1)
          APK_MD5=$(md5sum ../app-release.apk | cut -d' ' -f1)
          echo "✅ APK built successfully"
          echo "   Size: $APK_SIZE"
          echo "   MD5: $APK_MD5"
          echo "APK_PATH=$(pwd)/../app-release.apk" >> $GITHUB_ENV

      - name: Authenticate with API
        id: auth
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://api.appointer.hu' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          echo "🔐 Authenticating with API..."

          # Login to get session cookie
          RESPONSE=$(curl -s -c /tmp/cookies.txt -X POST "$API_BASE_URL/api/auth/sign-in/email" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}")

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Authentication failed: $(echo $RESPONSE | jq -r '.message // .error')"
            exit 1
          fi

          echo "✅ Authentication successful"
          echo "COOKIE_FILE=/tmp/cookies.txt" >> $GITHUB_ENV

      - name: Upload APK to S3 via API
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://api.appointer.hu' }}
          ORG_ID: ${{ steps.org-id.outputs.org_id }}
        run: |
          echo "📤 Uploading APK to organization: $ORG_ID"

          # Upload APK using multipart/form-data
          RESPONSE=$(curl -s -b "$COOKIE_FILE" -X POST \
            "$API_BASE_URL/api/admin/organizations/$ORG_ID/upload-apk" \
            -F "file=@$APK_PATH" \
            -H "Content-Type: multipart/form-data")

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "❌ Upload failed: $(echo $RESPONSE | jq -r '.message // .error')"
            exit 1
          fi

          APK_KEY=$(echo "$RESPONSE" | jq -r '.data.key // empty')
          if [ -z "$APK_KEY" ]; then
            echo "❌ Upload response missing APK key"
            echo "Response: $RESPONSE"
            exit 1
          fi

          echo "✅ APK uploaded successfully"
          echo "📦 S3 Key: $APK_KEY"
          echo "🔗 Download URL: $API_BASE_URL/api/file/$APK_KEY"

      - name: Cleanup
        if: always()
        run: |
          rm -f apps/mobile/app-release.apk
          rm -f /tmp/cookies.txt
          echo "🧹 Cleanup completed"
