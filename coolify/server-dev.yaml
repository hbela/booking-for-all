name: server-dev
type: nodejs
repository: https://github.com/hbela/my-better-t-app.git
branch: dev
root_directory: .
# Note: If using Docker build pack in Coolify, specify Dockerfile path as: apps/server/Dockerfile.dev
build:
  command: |
    npm install -g pnpm turbo
    pnpm install
    pnpm --filter @booking-for-all/db run db:generate:prod
    pnpm turbo run build --filter=server
start:
  command: pnpm --filter server run start
domains:
  - apidev.appointer.hu
environment:
  NODE_ENV: development
  PORT: 3000
  HOST: 0.0.0.0
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_URL: https://apidev.appointer.hu
  CORS_ORIGIN: https://webdev.appointer.hu
  FRONTEND_URL: https://webdev.appointer.hu
  PHP_SERVER_URL: https://phpdev.appointer.hu
  # S3 Configuration (Hetzner S3)
  S3_REGION: ${S3_REGION}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  PUBLIC_APP_URL: https://apidev.appointer.hu
  # R2 Configuration (Cloudflare R2 - fallback for APK files)
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
  R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
  R2_BUCKET_NAME: ${R2_BUCKET_NAME}
  # R2_ENDPOINT is optional - will be derived from R2_ACCOUNT_ID if not set
  # R2_ENDPOINT: ${R2_ENDPOINT}
ports:
  - 3000

