name: web
type: nodejs
repository: https://github.com/hbela/my-better-t-app.git
branch: main
root_directory: apps/web
build:
  command: |
    npm install -g pnpm turbo
    pnpm install
    export VITE_SENTRY_DSN="${VITE_SENTRY_DSN}"
    export VITE_SENTRY_RELEASE="${VITE_SENTRY_RELEASE}"
    export VITE_ENVIRONMENT="${VITE_ENVIRONMENT:-production}"
    echo "🔍 Build-time env vars:"
    echo "  VITE_SENTRY_DSN=${VITE_SENTRY_DSN:0:50}..."
    echo "  VITE_SENTRY_RELEASE=${VITE_SENTRY_RELEASE}"
    echo "  VITE_ENVIRONMENT=${VITE_ENVIRONMENT}"
    pnpm --filter web run build
start:
  command: pnpm --filter web run start
domains:
  - app.appointer.hu
environment:
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: 4173
  VITE_SERVER_URL: https://api.appointer.hu
  VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
  VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE}
  VITE_ENVIRONMENT: production
ports:
  - 4173




