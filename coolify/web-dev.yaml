name: web-dev
type: nodejs
repository: https://github.com/hbela/my-better-t-app.git
branch: dev
root_directory: apps/web
# Note: If using Docker build pack in Coolify, specify Dockerfile path as: apps/web/Dockerfile.dev
build:
  command: |
    npm install -g pnpm turbo
    pnpm install
    export VITE_SENTRY_DSN="${VITE_SENTRY_DSN}"
    export VITE_SENTRY_RELEASE="${VITE_SENTRY_RELEASE}"
    export VITE_ENVIRONMENT="${VITE_ENVIRONMENT:-development}"
    export VITE_SERVER_URL="${VITE_SERVER_URL:-https://apidev.appointer.hu}"
    export SKIP_PRERENDER="true"
    echo "🔍 Build-time env vars:"
    echo "  VITE_SENTRY_DSN=${VITE_SENTRY_DSN:0:50}..."
    echo "  VITE_SENTRY_RELEASE=${VITE_SENTRY_RELEASE}"
    echo "  VITE_ENVIRONMENT=${VITE_ENVIRONMENT}"
    echo "  VITE_SERVER_URL=${VITE_SERVER_URL}"
    echo "  SKIP_PRERENDER=true (prerendering temporarily disabled)"
    pnpm --filter web run build:no-prerender
start:
  command: pnpm --filter web run start
domains:
  - webdev.appointer.hu
environment:
  NODE_ENV: development
  HOST: 0.0.0.0
  PORT: 4173
  VITE_SERVER_URL: https://apidev.appointer.hu
  VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
  VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE}
  VITE_ENVIRONMENT: development
ports:
  - 4173

