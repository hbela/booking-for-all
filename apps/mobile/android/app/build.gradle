apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
    hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
}

/**
 * START SIGNING CONFIGURATION
 * This block validates with your GitHub Workflow.
 */
def getPassword(String currentUser, String keyChain) {
   return System.out.console() ? System.out.console().readPassword("\nEnter credential:") : ""
}

def keystoreFile = file("release.keystore")
// Check if Env vars are set (for CI), otherwise look for local properties
def storeFileEnv = System.getenv("RELEASE_STORE_FILE")
def storePasswordEnv = System.getenv("RELEASE_STORE_PASSWORD")
def keyAliasEnv = System.getenv("RELEASE_KEY_ALIAS")
def keyPasswordEnv = System.getenv("RELEASE_KEY_PASSWORD")

android {
    namespace "com.appointer.bookingforall" // MATCH YOUR APP ID
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.appointer.bookingforall" // MATCH YOUR APP ID
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // LOGIC: If env vars exist (CI), use them. Else if local file exists, use it. Else fall back to debug.
            if (storeFileEnv && file(storeFileEnv).exists()) {
                storeFile file(storeFileEnv)
                storePassword storePasswordEnv
                keyAlias keyAliasEnv
                keyPassword keyPasswordEnv
            } else if (keystoreFile.exists()) {
                storeFile keystoreFile
                storePassword "YOUR_PASSWORD" // Not recommended for repo
                keyAlias "YOUR_ALIAS"
                keyPassword "YOUR_PASSWORD"
            } else {
                println "⚠️ RELEASE KEYSTORE NOT FOUND: Defaulting to Debug Signing Config for Release Build."
                println "   (This is fine for S3/R2 downloads, but won't work for Play Store)"
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release // Uses the logic above
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}