pluginManagement {
    repositories {
        google()
        gradlePluginPortal()
        mavenCentral()
    }

    // Define potential locations for node_modules in a Turborepo
    // 1. Root of Monorepo (../../..) from apps/mobile/android
    def rootNodeModules = new File(rootDir, "../../../node_modules")
    // 2. App Local (../) from apps/mobile/android
    def appNodeModules = new File(rootDir, "../node_modules")

    def reactNativeGradlePlugin = null

    // Check for @react-native/gradle-plugin (comes bundled with React Native 0.76.9+)
    // Check Root Monorepo first (Most common for pnpm/turbo)
    if (new File(rootNodeModules, "@react-native/gradle-plugin").exists()) {
        reactNativeGradlePlugin = new File(rootNodeModules, "@react-native/gradle-plugin")
    } 
    // Check App Local second
    else if (new File(appNodeModules, "@react-native/gradle-plugin").exists()) {
        reactNativeGradlePlugin = new File(appNodeModules, "@react-native/gradle-plugin")
    }
    // Fallback: Check for unscoped react-native-gradle-plugin (older versions)
    else if (new File(rootNodeModules, "react-native-gradle-plugin").exists()) {
        reactNativeGradlePlugin = new File(rootNodeModules, "react-native-gradle-plugin")
    }
    else if (new File(appNodeModules, "react-native-gradle-plugin").exists()) {
        reactNativeGradlePlugin = new File(appNodeModules, "react-native-gradle-plugin")
    }

    if (reactNativeGradlePlugin != null) {
        includeBuild(reactNativeGradlePlugin)
    } else {
        // Fallback to the node command if manual pathing failed
        try {
            def path = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()
            if (path) {
                includeBuild(new File(path).getParentFile())
            } else {
                throw new RuntimeException("Could not find @react-native/gradle-plugin. Checked relative paths and tried 'node --print'.")
            }
        } catch (Exception e) {
            throw new RuntimeException("Could not find @react-native/gradle-plugin. Please run 'pnpm install' in your root.", e)
        }
    }
}

// Note: For Expo projects, autolinking is handled by expo-modules-autolinking
// The com.facebook.react.settings plugin is not required when using react-native-gradle-plugin
// Expo's autolinking will handle native module linking automatically

rootProject.name = 'bookingforall'

include ':app'
// Try to include @react-native/gradle-plugin as fallback (comes with React Native 0.76.9+)
try {
    def pluginPath = new File(rootDir, "../node_modules/@react-native/gradle-plugin")
    if (pluginPath.exists()) {
        includeBuild(pluginPath)
    }
} catch (Exception e) {
    // Ignore if not found, pluginManagement should handle it
}