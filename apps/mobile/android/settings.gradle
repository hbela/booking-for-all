// Top of the file: pluginManagement
pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }

    // Include the React Native Gradle plugin
    includeBuild(
        new File(
            ["node", "--print",
                "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"]
                .execute(null, rootDir)
                .text.trim()
        ).getParentFile()
    )
}

// Dependency resolution management
dependencyResolutionManagement {
    versionCatalogs {
        reactAndroidLibs {
            from(files(new File(
                ["node", "--print", "require.resolve('react-native/package.json')"]
                    .execute(null, rootDir)
                    .text.trim(),
                "../gradle/libs.versions.toml"
            )))
        }
    }
}

// Apply Expo autolinking
apply from: new File(
    ["node", "--print", "require.resolve('expo/package.json')"]
        .execute(null, rootDir)
        .text.trim(),
    "../scripts/autolinking.gradle"
)
useExpoModules()

// Include your app module
include(":app")

// ✅ Set the root project name
rootProject.name = "Booking for All"
