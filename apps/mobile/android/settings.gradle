pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
        mavenLocal()
    }
}

plugins {
    id("expo.settings")
}

extensions.configure(expo.settings.ExpoSettingsExtension) { ex ->
    if (System.getenv("EXPO_USE_COMMUNITY_AUTOLINKING") == "1") {
        ex.autolinkLibrariesFromCommand()
    } else {
        def command = [
            "node",
            "--no-warnings",
            "--eval",
            "require(require.resolve('expo-modules-autolinking', { paths: [require.resolve('expo/package.json')] }))(process.argv.slice(1))",
            "react-native-config",
            "--json",
            "--platform",
            "android"
        ].toList()
        ex.autolinkLibrariesFromCommand(command)
    }
}

rootProject.name = "Booking for All"

dependencyResolutionManagement {
    repositories {
        google()
        mavenCentral()
    }

    versionCatalogs {
        reactAndroidLibs {
            from(files(
                new File(
                    ["node", "--print", "require.resolve('react-native/package.json')"]
                        .execute(null, rootDir).text.trim(),
                    "../gradle/libs.versions.toml"
                )
            ))
        }
    }
}

apply from: new File(
    ["node", "--print", "require.resolve('expo/package.json')"]
        .execute(null, rootDir).text.trim(),
    "../scripts/autolinking.gradle"
)

useExpoModules()

include(":app")
